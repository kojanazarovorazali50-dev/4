<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JEOPARDY PRO FINAL</title>

<style>
body{background:#111;color:white;text-align:center;font-family:Arial;}

.score{
display:flex;justify-content:center;gap:10px;margin:10px;
flex-wrap:wrap;
}

.team{
padding:10px;
border:2px solid white;
border-radius:8px;
}

.active{background:green;}

table{margin:auto;border-collapse:collapse;}

td,th{
width:110px;height:60px;
border:2px solid white;
cursor:pointer;
text-align:center;
}

th{background:red;}
td{background:blue;}

.modal{
position:fixed;
top:30%;left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border:2px solid white;
width:60%;
}

.option{
margin:8px;
padding:10px;
background:#333;
cursor:pointer;
}

.option:hover{background:#555;}

.bonus{
background:gold !important;
color:black !important;
}

input{
width:60px;
text-align:center;
}
</style>
</head>

<body>

<h2>🎮 JEOPARDY PRO FINAL</h2>

<!-- SCORE PANEL -->
<div class="score">
<div class="team" id="t0">T1 <span id="s0">0</span> <input onchange="edit(0,this.value)"></div>
<div class="team" id="t1">T2 <span id="s1">0</span> <input onchange="edit(1,this.value)"></div>
<div class="team" id="t2">T3 <span id="s2">0</span> <input onchange="edit(2,this.value)"></div>
<div class="team" id="t3">T4 <span id="s3">0</span> <input onchange="edit(3,this.value)"></div>
</div>

<table id="board"></table>

<script>

let scores=[0,0,0,0];
let current=0;
let doubleTurn=[false,false,false,false];

const pts=[100,200,300,400,500,600,700,800];
const cats=["MATH","HISTORY","GEO","ENGLISH","SPORT"];

const q = [

/* 1 - MATH */
[
{q:"2+2?", o:["3","4","5","6"], a:1},
{q:"5×5?", o:["20","25","30","15"], a:1},
{q:"10-3?", o:["6","7","8","9"], a:1},
{q:"12/4?", o:["2","3","4","6"], a:1},
{q:"9+1?", o:["10","11","12","13"], a:0},
{q:"6+6?", o:["10","12","14","16"], a:1},
{q:"8×2?", o:["14","16","18","20"], a:1},
{q:"20/5?", o:["2","3","4","5"], a:2}
],

/* 2 - TARIX */
[
{q:"O‘zbekiston poytaxti?", o:["Toshkent","Buxoro","Xiva","Nukus"], a:0},
{q:"1991 yil?", o:["Mustaqillik","Urush","Inqilob","Davlat"], a:0},
{q:"Amir Temur?", o:["Sarkarda","Shoir","Olim","Aktyor"], a:0},
{q:"Karimov kim?", o:["Prezident","Sportchi","Olim","Aktyor"], a:0},
{q:"1945 yil?", o:["Urush tugadi","Boshlanish","Davlat","Tinchlik"], a:0},
{q:"Bayroq rangi?", o:["Ko‘k","Qizil","Sariq","Qora"], a:0},
{q:"O‘zbekiston nima?", o:["Davlat","Shahar","Daryo","Tog"], a:0},
{q:"Temur tug‘ilgan joy?", o:["Shahrisabz","Xiva","Nukus","Farg‘ona"], a:0}
],

/* 3 - GEOGRAPHY */
[
{q:"Eng katta okean?", o:["Tinch","Atlantika","Hind","Arktika"], a:0},
{q:"Qit’alar soni?", o:["7","5","6","8"], a:0},
{q:"Nil nima?", o:["Daryo","Tog","Ko‘l","Shahar"], a:0},
{q:"Yer nima?", o:["Planet","Yulduz","Oy","Quyosh"], a:0},
{q:"Eng sovuq joy?", o:["Antarktida","Afrika","Osiyo","Yevropa"], a:0},
{q:"Dunyo nima?", o:["Planet","Yulduz","Oy","Quyosh"], a:0},
{q:"Qit’a soni?", o:["7","6","5","4"], a:0},
{q:"Daryo misol?", o:["Nil","Amu","Sirdaryo","Volga"], a:0}
],

/* 4 - ENGLISH */
[
{q:"Hello?", o:["Salom","Xayr","Rahmat","Uzr"], a:0},
{q:"Book?", o:["Kitob","Qalam","Stol","Telefon"], a:0},
{q:"Apple?", o:["Olma","Banan","Uzum","Anor"], a:0},
{q:"Go past?", o:["Went","Go","Gone","Going"], a:0},
{q:"Dog?", o:["It","Mushuk","Ot","Qush"], a:0},
{q:"Water?", o:["Suv","Olov","Havo","Tuproq"], a:0},
{q:"Sun?", o:["Quyosh","Oy","Yulduz","Yer"], a:0},
{q:"Ice?", o:["Muz","Suv","Tosh","Olov"], a:0}
],

/* 5 - SPORT */
[
{q:"Futbolda nechta o‘yinchi?", o:["11","10","9","12"], a:0},
{q:"Messi qayerlik?", o:["Argentina","Braziliya","Fransiya","Italiya"], a:0},
{q:"Ronaldo qayerlik?", o:["Portugal","Ispaniya","Germaniya","Fransiya"], a:0},
{q:"NBA nima?", o:["Basketbol","Futbol","Tennis","Hokkey"], a:0},
{q:"Olimpiada necha yilda?", o:["4","2","1","5"], a:0},
{q:"Gepard nima?", o:["Tez","Sekin","Og‘ir","Kichik"], a:0},
{q:"Sport nima?", o:["Harakat","Uyqu","Ovqat","Kitob"], a:0},
{q:"O‘yin nima?", o:["Fun","Work","Sleep","Eat"], a:0}
]

];

/* 4 BONUS CELLS */
let bonusCells=[];
while(bonusCells.length<4){
let r=Math.floor(Math.random()*40);
if(!bonusCells.includes(r)) bonusCells.push(r);
}

function board(){
let t=document.getElementById("board");

let h="<tr>";
cats.forEach(c=>h+="<th>"+c+"</th>");
h+="</tr>";
t.innerHTML=h;

for(let i=0;i<8;i++){
let r="<tr>";
for(let j=0;j<5;j++){
let id=i*5+j;
r+=<td onclick="openQ(${j},${i},this,${id})">${pts[i]}</td>;
}
r+="</tr>";
t.innerHTML+=r;
}
update();
}

function openQ(c,i,cell,id){

/* 🟡 BONUS */
if(bonusCells.includes(id)){

cell.classList.add("bonus");

let type=Math.floor(Math.random()*4);

if(type===0){
scores[current]+=pts[i]*2;
alert("⚡ 2X BONUS");
}

if(type===1){
let e=(current+1)%4;
let tmp=scores[current];
scores[current]=scores[e];
scores[e]=tmp;
alert("🔁 SWAP");
}

if(type===2){
let e=(current+1)%4;
let val=Math.min(scores[e],1000);
scores[e]-=val;
scores[current]+=val;
alert("🦹 STEAL +" + val);
}

if(type===3){
scores[current]+=1000;
alert("💰 +1000 BONUS");
}

next();
update();
return;
}

/* SAVOL */
let qq=q[c][i];

let div=document.createElement("div");
div.className="modal";
div.innerHTML="<h3>"+qq.q+"</h3>";

qq.o.forEach((o,x)=>{
let b=document.createElement("div");
b.className="option";
b.innerText=o;

b.onclick=()=>{

let p=pts[i];

if(doubleTurn[current]){
p*=2;
doubleTurn[current]=false;
}

if(x===qq.a) scores[current]+=p;
else scores[current]-=p;

cell.style.background="gray";
cell.onclick=null;

document.body.removeChild(div);

next();
update();
};

div.appendChild(b);
});

document.body.appendChild(div);
}

function next(){
current=(current+1)%4;
}

function update(){
for(let i=0;i<4;i++){
document.getElementById("s"+i).innerText=scores[i];
document.getElementById("t"+i).classList.remove("active");
}
document.getElementById("t"+current).classList.add("active");
}

/* ✍️ MANUAL EDIT SCORE */
function edit(i,val){
scores[i]=Number(val);
update();
}

board();

</script>

</body>
</html>
